        \ | grep -v migrations || true); if [ -z \"$VIEWS\" ]; then echo 'No payment/checkout\
        \ views found'; exit 0; fi; FAIL=0; for f in $VIEWS; do if ! grep -qE '@csrf_exempt'\
        \ \"$f\"; then echo \"OK CSRF: $f enforces CSRF\"; else echo \"HIGH: $f uses\
        \ @csrf_exempt on a payment/checkout view\"; FAIL=1; fi; if ! grep -qiE 'idempot|Idempotency-Key|request\\\
